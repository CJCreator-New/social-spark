<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContentForge — AI-powered weekly content calendars</title>
    <meta
      name="description"
      content="Turn one brief into a week of on-brand posts for LinkedIn, X, Instagram, Facebook, newsletters, and blogs. Schedule, refine, and publish — all in one place."
    />
    <meta name="author" content="ContentForge" />
    <meta
      name="keywords"
      content="content calendar, AI social media, LinkedIn posts, content marketing, post generator, scheduling"
    />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="ContentForge — AI-powered weekly content calendars" />
    <meta
      property="og:description"
      content="Turn one brief into a week of on-brand posts for LinkedIn, X, Instagram, Facebook, newsletters, and blogs."
    />
    <meta property="og:url" content="https://contentforged.lovable.app/" />
    <meta
      property="og:image"
      content="https://contentforged.lovable.app/brand/logo-horizontal.png"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ContentForge — AI-powered weekly content calendars" />
    <meta
      name="twitter:description"
      content="Turn one brief into a week of on-brand posts for LinkedIn, X, Instagram, Facebook, newsletters, and blogs."
    />
    <meta
      name="twitter:image"
      content="https://contentforged.lovable.app/brand/logo-horizontal.png"
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://contentforged.lovable.app/" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#c2410c" />
  </head>
  <body style="background: #faf8f4; color: #1c1917; margin: 0">
    <div id="root">
      <div
        id="boot-fallback"
        style="
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: Inter, system-ui, sans-serif;
          background: #faf8f4;
        "
      >
        <div style="text-align: center; opacity: 0.7">
          <!-- fill values below must stay in sync with BRAND_COLOR in src/constants/branding.ts -->
          <svg
            width="32"
            height="32"
            viewBox="0 0 32 32"
            style="
              margin: 0 auto 14px;
              display: block;
              animation: cf-pulse 1.4s ease-in-out infinite;
            "
          >
            <rect x="0" y="0" width="32" height="32" rx="9" fill="#c2410c" />
            <path
              fill="#ffffff"
              d="M16 6 C 20 10, 22.5 14, 21 18.5 C 20 21.8, 17 24, 14 24 C 10.5 24, 8 21.3, 8 18 C 8 14.2, 10.5 11, 13.5 8.2 C 14.5 7.3, 15.3 6.6, 16 6 Z"
            />
            <path
              fill="#c2410c"
              d="M14.5 14 C 16.5 16, 17.3 18, 16.3 20 C 15.6 21.4, 14 22, 12.6 21.3 C 11.3 20.6, 10.8 19, 11.4 17.6 C 12 16.1, 13.2 14.9, 14.5 14 Z"
            />
          </svg>
          <div style="font-size: 13px; color: #57534e">Loading ContentForge…</div>
        </div>
      </div>
    </div>
    <style>
      @keyframes cf-pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.55;
          transform: scale(0.94);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-fallback svg {
          animation: none !important;
        }
      }
    </style>
    <script>
      // Watchdog: if React hasn't replaced #root within 10s, show a reload prompt
      // so users never see a permanent blank screen.
      window.__cfBootStart = Date.now();
      setTimeout(function () {
        var fb = document.getElementById("boot-fallback");
        if (fb && fb.isConnected) {
          fb.innerHTML =
            '<div style="text-align:center;font-family:Inter,system-ui,sans-serif;max-width:380px;padding:24px;">' +
            '<h1 style="font-size:18px;font-weight:600;margin:0 0 10px;color:#1c1917;">Taking longer than expected</h1>' +
            '<p style="font-size:13px;opacity:0.7;margin:0 0 18px;color:#57534e;">The app didn\'t finish loading. Reload to try again, or clear your browser cache if this keeps happening.</p>' +
            '<button onclick="window.location.reload()" style="background:#c2410c;color:white;border:none;padding:9px 18px;border-radius:24px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(194,65,12,0.2);">Reload</button>' +
            "</div>";
        }
      }, 10000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
